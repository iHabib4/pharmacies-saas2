<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Status</title>
</head>
<body>
    <h2>Order Status</h2>

    <!-- ETA display -->
    <div>
      <h3>Estimated Arrival Time: <span id="eta">--</span> min</h3>
    </div>

    <!-- JavaScript to fetch ETA -->
    <script>
    const orderId = 1; // replace with the actual order ID

    async function fetchETA() {
        const response = await fetch(`/api/orders/${orderId}/eta/`);
        const data = await response.json();
        if (data.eta_minutes) {
            document.getElementById('eta').innerText = data.eta_minutes;
        }
    }

    // Fetch immediately, then every 30 seconds
    fetchETA();
    setInterval(fetchETA, 30000);
    </script>
</body>
</html>
