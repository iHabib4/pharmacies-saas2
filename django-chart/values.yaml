# Default values for django-chart

replicaCount: 1

image:
  repository: django-backend
  tag: "1.0"
  pullPolicy: Never
  containerPort: 8000

# Image pull secrets (for private repos)
imagePullSecrets: []

# Override chart name
nameOverride: ""
fullnameOverride: ""

# Service account configuration
serviceAccount:
  create: true
  automount: true
  name: ""
  annotations: {}

# Pod labels and annotations
podLabels: {}
podAnnotations: {}

# Pod security context
podSecurityContext: {}
  # fsGroup: 2000

# Container security context
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Service configuration
service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

# HTTPRoute (Gateway API) configuration
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
      # namespace: default
  hostnames:
    - chart-example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headers
      # filters:
      #   - type: RequestHeaderModifier
      #     requestHeaderModifier:
      #       set:
      #       - name: My-Overwrite-Header
      #         value: this-is-the-only-value
      #       remove:
      #       - User-Agent

# Resources configuration
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /
    port: 8000

readinessProbe:
  httpGet:
    path: /
    port: 8000

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Volumes and volume mounts
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

# Node scheduling
nodeSelector: {}
tolerations: []
affinity: {}

# Environment variables
env:
  - name: DJANGO_SETTINGS_MODULE
    value: "config.settings"
  - name: GDAL_LIBRARY_PATH
    value: "/opt/homebrew/opt/gdal/lib/libgdal.dylib"
  - name: PYTHONUNBUFFERED
    value: "1"
  - name: DATABASE_URL
    value: "postgres://username:password@postgres-service:5432/dbname"

# Persistence
persistence:
  enabled: false
